columns:

- header: ID
  value: this.id

- header: NAME
  value: "has(this.metadata.name)? this.metadata.name: '-'"

- header: DESCRIPTION
  value: "has(this.description) && this.description != ''? this.description: '-'"

- header: BACKENDS
  value: "has(this.backends)? string(this.backends.size()): '0'"

- header: STATE
  value: this.state
  type: osac.private.v1.StorageTierState
