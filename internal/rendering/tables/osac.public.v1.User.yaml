columns:

- header: ID
  value: this.id

- header: NAME
  value: "has(this.metadata.name)? this.metadata.name: '-'"

- header: USERNAME
  value: this.spec.username

- header: EMAIL
  value: "has(this.spec.email) && this.spec.email != ''? this.spec.email: '-'"

- header: ENABLED
  value: "this.spec.enabled? 'true': 'false'"

- header: TENANT
  value: "has(this.metadata.tenant)? this.metadata.tenant: '-'"
  type: osac.public.v1.Tenant
  lookup: true
