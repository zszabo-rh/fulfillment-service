syntax = "proto3";

package osac.private.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "osac/private/v1/condition_status_type.proto";
import "osac/private/v1/metadata_type.proto";

// Contains the details about the compute instance that are available only for the system.
message ComputeInstance {
  // Public data.
  string id = 1;
  Metadata metadata = 2;
  ComputeInstanceSpec spec = 3;
  ComputeInstanceStatus status = 4;
}

// Contains the image configuration for a compute instance.
message ComputeInstanceImage {
  // Image source type (e.g. "registry").
  string source_type = 1;

  // Image reference (e.g. OCI image URL).
  string source_ref = 2;
}

// Contains the disk configuration for a compute instance.
message ComputeInstanceDisk {
  // Disk size in GiB.
  int32 size_gib = 1;
}

// Groups one subnet with security groups for that network attachment (multi-NIC VMs).
message NetworkAttachment {
  // Fulfillment Subnet ID.
  string subnet = 1;

  // Fulfillment SecurityGroup IDs for this NIC.
  repeated string security_groups = 2;
}

message ComputeInstanceSpec {
  // Copies of the public fields.
  string template = 1;
  map<string, google.protobuf.Any> template_parameters = 2;
  optional google.protobuf.Timestamp restart_requested_at = 3;

  // Image configuration.
  optional ComputeInstanceImage image = 4;

  // Reserved field numbers for removed fields (do not reuse).
  reserved 5, 6;
  reserved "cores", "memory_gib";

  // SSH public key.
  optional string ssh_key = 7;

  // Boot disk configuration.
  optional ComputeInstanceDisk boot_disk = 8;

  // Additional disk configurations.
  repeated ComputeInstanceDisk additional_disks = 9;

  // Run strategy for the compute instance (e.g. "Always" or "Halted").
  optional string run_strategy = 10;

  // User data for the compute instance (e.g. cloud-init, ignition).
  optional string user_data = 11;

  // Reserved field numbers for removed fields (do not reuse).
  reserved 12, 13;
  reserved "subnet", "security_groups";

  // Network attachments: one entry per NIC.
  repeated NetworkAttachment network_attachments = 14;

  // Reference to a compute instance catalog item. Mutually exclusive with template during the migration period.
  // When set, the server fetches the catalog item and applies its field definitions.
  string catalog_item = 15;

  // Indicates whether this compute instance runs a Windows guest OS (true) or Linux (false/omitted).
  optional bool is_windows = 16;

  // Reference to an instance type by name. Specifies the compute configuration (cores, memory)
  // for this instance. The API validates that the instance type exists and is not OBSOLETE;
  // resolution of cores/memory_gib happens in the reconciler.
  optional string instance_type = 17;
}

message ComputeInstanceStatus {
  // Public fields.
  ComputeInstanceState state = 1;
  repeated ComputeInstanceCondition conditions = 2;
  // Internal IP address of the compute instance.
  string internal_ip_address = 3;

  // Identifier of the hub that was selected for this compute instance.
  string hub = 4;

  optional google.protobuf.Timestamp last_restarted_at = 5;

  // Public IP address attached to the compute instance.
  string public_ip_address = 6;
}

enum ComputeInstanceState {
  COMPUTE_INSTANCE_STATE_UNSPECIFIED = 0;
  COMPUTE_INSTANCE_STATE_STARTING = 1;
  COMPUTE_INSTANCE_STATE_RUNNING = 2;
  COMPUTE_INSTANCE_STATE_FAILED = 3;
  COMPUTE_INSTANCE_STATE_DELETING = 4;
  COMPUTE_INSTANCE_STATE_STOPPING = 5;
  COMPUTE_INSTANCE_STATE_STOPPED = 6;
  COMPUTE_INSTANCE_STATE_PAUSED = 7;
}

message ComputeInstanceCondition {
  ComputeInstanceConditionType type = 1;
  ConditionStatus status = 2;
  google.protobuf.Timestamp last_transition_time = 3;
  optional string reason = 4;
  optional string message = 5;
}

enum ComputeInstanceConditionType {
  COMPUTE_INSTANCE_CONDITION_TYPE_UNSPECIFIED = 0;
  COMPUTE_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED = 1;
  COMPUTE_INSTANCE_CONDITION_TYPE_READY = 2;
  COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS = 3;
  COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_FAILED = 4;
  COMPUTE_INSTANCE_CONDITION_TYPE_PROVISIONED = 5;
  COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED = 6;
}
