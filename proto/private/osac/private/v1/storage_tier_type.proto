syntax = "proto3";

package osac.private.v1;

import "osac/private/v1/metadata_type.proto";

// Identifies the storage protocol used by a backend association within a storage tier.
enum StorageProtocol {
  // Protocol is unknown or has not been specified.
  STORAGE_PROTOCOL_UNSPECIFIED = 0;

  // NFS (Network File System) protocol for file-based storage access.
  STORAGE_PROTOCOL_NFS = 1;

  // Block storage protocol for volume-based storage access.
  STORAGE_PROTOCOL_BLOCK = 2;
}

// Lifecycle states for StorageTier resources.
enum StorageTierState {
  // State is unknown or has not been determined yet.
  STORAGE_TIER_STATE_UNSPECIFIED = 0;

  // The storage tier is active and available for use by tenants.
  STORAGE_TIER_STATE_ACTIVE = 1;
}

// Represents the association of a storage backend within a storage tier, including protocol-specific
// configuration and quota limits.
message BackendAssociation {
  // Unique identifier of the associated storage backend.
  string backend_id = 1;

  // Storage protocol used for this backend association.
  StorageProtocol protocol = 2;

  // Maximum read bandwidth in megabytes per second.
  int32 max_read_bandwidth_mbs = 3;

  // Maximum write bandwidth in megabytes per second.
  int32 max_write_bandwidth_mbs = 4;

  // Storage quota in gibibytes (GiB) allocated to this backend association.
  int64 quota_gib = 5;

  // Whether data at rest is encrypted on this backend.
  bool encryption_enabled = 6;
}

// Represents a storage tier in the OSAC platform.
//
// StorageTier is a platform-scoped entity that groups one or more StorageBackend associations with
// protocol, bandwidth, quota, and encryption settings. It is managed exclusively by Cloud Provider
// Admins through the private API. Tenants consume storage tiers indirectly when provisioning
// storage-enabled resources.
//
// StorageTier follows the NetworkClass pattern: DB-backed with no Kubernetes CRD and no reconciler.
message StorageTier {
  // Unique identifier of the storage tier.
  string id = 1;

  // Metadata of the storage tier.
  Metadata metadata = 2;

  // Human-readable description of the storage tier.
  string description = 3;

  // List of backend associations that compose this storage tier.
  repeated BackendAssociation backends = 4;

  // Current lifecycle state of the storage tier.
  StorageTierState state = 5;
}
