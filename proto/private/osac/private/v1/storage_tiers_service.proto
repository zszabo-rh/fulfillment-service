syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/storage_tier_type.proto";

message StorageTiersListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all storage tiers
  // with a specific state:
  //
  //     this.state == 1
  //
  // If this isn't provided, or if the value is empty, then all the storage tiers that the user has permission to see
  // will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the storage tier instead of the names of the columns of a table. For example, in
  // order to sort the storage tiers descending by description the value should be:
  //
  //     description desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message StorageTiersListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 1;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 2;

  // List of results.
  repeated StorageTier items = 3;
}

message StorageTiersGetRequest {
  string id = 1;
}

message StorageTiersGetResponse {
  StorageTier object = 1;
}

message StorageTiersCreateRequest {
  StorageTier object = 1;
}

message StorageTiersCreateResponse {
  StorageTier object = 1;
}

message StorageTiersUpdateRequest {
  StorageTier object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message StorageTiersUpdateResponse {
  StorageTier object = 1;
}

message StorageTiersDeleteRequest {
  string id = 1;
}

message StorageTiersDeleteResponse {}

message StorageTiersSignalRequest {
  string id = 1;
}

message StorageTiersSignalResponse {}

service StorageTiers {
  // Retrieves the list of storage tiers.
  rpc List(StorageTiersListRequest) returns (StorageTiersListResponse) {
    option (google.api.http) = {get: "/api/private/v1/storage_tiers"};
  }

  // Retrieves the details of one specific storage tier.
  rpc Get(StorageTiersGetRequest) returns (StorageTiersGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/storage_tiers/{id}"
      response_body: "object"
    };
  }

  // Creates a new storage tier.
  rpc Create(StorageTiersCreateRequest) returns (StorageTiersCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/storage_tiers"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing storage tier.
  rpc Update(StorageTiersUpdateRequest) returns (StorageTiersUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/storage_tiers/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a storage tier.
  rpc Delete(StorageTiersDeleteRequest) returns (StorageTiersDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/storage_tiers/{id}"};
  }

  // Signal is required by the generic server infrastructure but is not implemented for StorageTier
  // (no reconciler). Calls return UNIMPLEMENTED.
  rpc Signal(StorageTiersSignalRequest) returns (StorageTiersSignalResponse) {
  }
}
