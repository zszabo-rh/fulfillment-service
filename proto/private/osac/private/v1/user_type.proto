syntax = "proto3";

package osac.private.v1;

import "google/protobuf/timestamp.proto";
import "osac/private/v1/condition_status_type.proto";
import "osac/private/v1/metadata_type.proto";

// A user in a tenant's identity provider.
message User {
  // Unique identifier of the user.
  string id = 1;

  osac.private.v1.Metadata metadata = 2;

  // Specification of the user.
  UserSpec spec = 3;

  // Status of the user.
  UserStatus status = 4;
}

// UserSpec contains the desired state of the user.
message UserSpec {
  // Username for authentication.
  string username = 1;

  // Email address.
  string email = 2;

  // Whether the user account is enabled.
  bool enabled = 3;

  // Credentials for the user. This is write-only and will not be returned in responses.
  optional UserCredentials credentials = 4;
}

// UserCredentials contains the authentication credentials for a user.
message UserCredentials {
  // Password for the user.
  optional string password = 1;

  // Whether the password is temporary and must be changed on first login.
  bool temporary_password = 2;
}

// UserStatus contains the observed state of the user.
message UserStatus {
  // The user's current state.
  string phase = 1;

  // Additional conditions.
  repeated UserCondition conditions = 2;

  // The Keycloak user ID for this user in the identity provider.
  // This is set when the user is created or imported and is used for role assignments.
  string keycloak_user_id = 3;
}

// UserCondition represents a condition of a user.
message UserCondition {
  string type = 1;
  osac.private.v1.ConditionStatus status = 2;
  google.protobuf.Timestamp last_transition_time = 3;
  optional string reason = 4;
  optional string message = 5;
}
