syntax = "proto3";

package osac.public.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "osac/public/v1/condition_status_type.proto";
import "osac/public/v1/metadata_type.proto";

// Contains the image configuration for a bare metal instance.
message BareMetalInstanceImage {
  // Image source type (e.g. "registry").
  string source_type = 1;

  // Image reference (e.g. OCI image URL).
  string source_ref = 2;
}

// Contains the details of a bare metal instance.
//
// The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status
// of the bare metal instance, is provided by the system and can't be modified by the user.
message BareMetalInstance {
  // Unique identifier of the bare metal instance.
  string id = 1;

  Metadata metadata = 2;
  BareMetalInstanceSpec spec = 3;
  BareMetalInstanceStatus status = 4;
}

// Network attachment for a bare metal instance NIC.
// Groups a subnet with security groups and a physical interface binding.
message BareMetalNetworkAttachment {
  // Fulfillment Subnet ID. Must reference a Subnet in READY state.
  string subnet = 1 [(google.api.field_behavior) = IMMUTABLE];

  // Fulfillment SecurityGroup IDs applied on this NIC.
  // Each must be READY and belong to the same VirtualNetwork as the subnet.
  repeated string security_groups = 2;

  // Physical interface name from the HostType's NetworkInterface list.
  // When omitted on a single-attachment instance, the system selects the first fabric-role interface.
  optional string interface = 3 [(google.api.field_behavior) = IMMUTABLE];

  // Designates this attachment as the default gateway for multi-NIC instances.
  // When omitted on a single-attachment instance, that attachment is implicitly primary.
  optional bool primary = 4 [(google.api.field_behavior) = IMMUTABLE];
}

// The spec contains the details of a bare metal instance as desired by the user.
message BareMetalInstanceSpec {
  // Reference to the BareMetalInstanceCatalogItem. Required on create; immutable after creation.
  string catalog_item = 1 [(google.api.field_behavior) = IMMUTABLE];

  // SSH public key injected into the OS at provisioning time. Immutable after creation.
  // Must be a valid SSH public key in OpenSSH format (ssh-rsa, ssh-ed25519, etc.).
  // Invalid keys are rejected at create time with a 400 error.
  optional string ssh_public_key = 2 [(google.api.field_behavior) = IMMUTABLE];

  // User data (e.g. cloud-init). Passed to the OS at first boot. Immutable after creation.
  // Maximum size: 64 KB.
  optional string user_data = 3 [(google.api.field_behavior) = IMMUTABLE];

  // Run strategy controls the power state of the bare metal instance.
  // An enum is used rather than a boolean to leave room for future states (e.g. suspended backends).
  optional BareMetalInstanceRunStrategy run_strategy = 4;

  // Used to trigger a restart of the physical machine. Change it to any value to trigger the restart.
  // The value itself is not important; only the change matters.
  // The controller compares this with `status.restart_trigger` and initiates a power cycle when they differ.
  int64 restart_trigger = 5;

  // Values of the template parameters passed to the provisioning template.
  //
  // When using the HTTP+JSON version of the API the values must be represented as documented in the [ProtoJSON format
  // document](https://protobuf.dev/programming-guides/json). For example, if the template has a `disk_layout`
  // parameter of string type, the complete bare metal instance should be represented like this:
  //
  // ```json
  // {
  //   "spec": {
  //     "catalog_item": "gpu-node",
  //     "template_parameters": {
  //       "disk_layout": {
  //         "@type": "type.googleapis.com/google.protobuf.StringValue",
  //         "value": "raid1"
  //       }
  //     }
  //   }
  // }
  // ```
  //
  // The possible values of the `@type` are the same as those used by the `type_url` field of the `Any` type:
  //
  // | Type                           | Value                                             |
  // |--------------------------------|---------------------------------------------------|
  // | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
  // | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
  // | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
  // | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
  // | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
  // | String                         | `type.googleapis.com/google.protobuf.StringValue` |
  // | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
  // | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
  // | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
  // | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |
  //
  // These parameters can't be modified after the bare metal instance is created.
  map<string, google.protobuf.Any> template_parameters = 6 [(google.api.field_behavior) = IMMUTABLE];

  // OS base image configuration.
  optional BareMetalInstanceImage image = 7 [(google.api.field_behavior) = IMMUTABLE];

  // Network attachments for the bare metal instance. One entry per physical NIC.
  // The list structure is immutable after creation (entries cannot be added or removed),
  // but security_groups within each entry can be updated.
  repeated BareMetalNetworkAttachment network_attachments = 8;

  // When true, the system auto-selects an ExternalIPPool and creates an ExternalIP
  // with an ExternalIPAttachment for this instance atomically during creation.
  // Immutable after creation.
  bool auto_external_ip_attachment = 9 [(google.api.field_behavior) = IMMUTABLE];
}

// The status contains the details of the bare metal instance provided by the system.
message BareMetalInstanceStatus {
  // Indicates the overall state of the bare metal instance.
  BareMetalInstanceState state = 1;

  // Contains a list of conditions that describe in detail the status of the bare metal instance.
  repeated BareMetalInstanceCondition conditions = 2;

  // Echo of `spec.restart_trigger` after the controller has executed the requested restart.
  // The controller sets this to match `spec.restart_trigger` once the power cycle is complete.
  int64 restart_trigger = 3;
}

// Run strategy for the bare metal instance.
enum BareMetalInstanceRunStrategy {
  BARE_METAL_INSTANCE_RUN_STRATEGY_UNSPECIFIED = 0;

  // The instance is kept powered on.
  BARE_METAL_INSTANCE_RUN_STRATEGY_ALWAYS = 1;

  // The instance is powered off.
  BARE_METAL_INSTANCE_RUN_STRATEGY_HALTED = 2;
}

// Represents the overall state of a bare metal instance.
enum BareMetalInstanceState {
  BARE_METAL_INSTANCE_STATE_UNSPECIFIED  = 0;
  BARE_METAL_INSTANCE_STATE_PROVISIONING = 1;
  BARE_METAL_INSTANCE_STATE_RUNNING      = 2;
  BARE_METAL_INSTANCE_STATE_FAILED       = 3;
  BARE_METAL_INSTANCE_STATE_DELETING     = 4;
  BARE_METAL_INSTANCE_STATE_STARTING     = 5;
  BARE_METAL_INSTANCE_STATE_STOPPING     = 6;
  BARE_METAL_INSTANCE_STATE_STOPPED      = 7;
}

// Contains the details of a condition that describes the status of a bare metal instance.
message BareMetalInstanceCondition {
  BareMetalInstanceConditionType type = 1;
  ConditionStatus status = 2;
  google.protobuf.Timestamp last_transition_time = 3;
  optional string reason = 4;
  optional string message = 5;
}

// Types of conditions used to describe the status of a bare metal instance.
enum BareMetalInstanceConditionType {
  BARE_METAL_INSTANCE_CONDITION_TYPE_UNSPECIFIED = 0;

  // Infrastructure has been allocated to this instance by the baremetal fulfillment component.
  BARE_METAL_INSTANCE_CONDITION_TYPE_PROVISIONED = 1;

  // OS image and user configuration have been applied by the provisioning provider.
  BARE_METAL_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED = 2;

  // The machine is available and assigned to the tenant.
  // Does not indicate OS readiness — the tenant is responsible for OS-level checks.
  BARE_METAL_INSTANCE_CONDITION_TYPE_READY = 3;

  // A power cycle (restart) is currently in progress.
  BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS = 4;

  // A restart request has failed.
  BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_FAILED = 5;

  // Configuration changes require a restart to take effect.
  BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED = 6;
}
