syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";

// Type of resource to connect a console to.
enum ConsoleResourceType {
  CONSOLE_RESOURCE_TYPE_UNSPECIFIED = 0;
  CONSOLE_RESOURCE_TYPE_COMPUTE_INSTANCE = 1;
  CONSOLE_RESOURCE_TYPE_HOST = 2;
}

// Type of console connection.
enum ConsoleType {
  CONSOLE_TYPE_UNSPECIFIED = 0;
  CONSOLE_TYPE_SERIAL = 1;
  CONSOLE_TYPE_VNC = 2;
}

// State of the console connection.
enum ConsoleConnectionState {
  CONSOLE_CONNECTION_STATE_UNSPECIFIED = 0;
  CONSOLE_CONNECTION_STATE_CONNECTING = 1;
  CONSOLE_CONNECTION_STATE_CONNECTED = 2;
  CONSOLE_CONNECTION_STATE_DISCONNECTED = 3;
  CONSOLE_CONNECTION_STATE_ERROR = 4;
}

// Client-to-server message for the bidirectional console stream.
message ConsoleConnectRequest {
  oneof payload {
    ConsoleConnectInit init = 1;
    ConsoleInput input = 2;
    ConsoleResize resize = 3;
  }
}

// Initialization message. Must be the first message sent by the client.
message ConsoleConnectInit {
  ConsoleResourceType resource_type = 1;
  string resource_id = 2;
  ConsoleType type = 3;
}

// Terminal input data from the client.
message ConsoleInput {
  bytes data = 1;
}

// Terminal resize event. No-op for serial consoles; forward-compatible for VNC.
message ConsoleResize {
  uint32 width = 1;
  uint32 height = 2;
}

// Server-to-client message for the bidirectional console stream.
message ConsoleConnectResponse {
  oneof payload {
    ConsoleOutput output = 1;
    ConsoleStatus status = 2;
  }
}

// Terminal output data from the compute instance.
message ConsoleOutput {
  bytes data = 1;
}

// Status update from the server about the console connection.
message ConsoleStatus {
  ConsoleConnectionState state = 1;
  string message = 2;
}

// Request to check console availability without connecting.
message ConsoleGetAccessRequest {
  ConsoleResourceType resource_type = 1;
  string resource_id = 2;
}

// Response with console availability information.
message ConsoleGetAccessResponse {
  bool available = 1;
  string reason = 2;
  repeated ConsoleType supported_types = 3;
}

// Service for interactive console access to resources.
service Console {
  // Bidirectional stream for console access. The first message sent by the
  // client must be a ConsoleConnectInit. Subsequent messages carry terminal
  // input (ConsoleInput) or resize events (ConsoleResize).
  //
  // No google.api.http annotation: gRPC-Gateway does not support bidi streaming.
  rpc Connect(stream ConsoleConnectRequest) returns (stream ConsoleConnectResponse);

  // Check console availability for a resource without establishing a connection.
  rpc GetAccess(ConsoleGetAccessRequest) returns (ConsoleGetAccessResponse) {
    option (google.api.http) = {
      get: "/api/osac/public/v1/console/{resource_type}/{resource_id}/access"
    };
  }
}
